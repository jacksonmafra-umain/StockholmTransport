# Publishes @jacksonmafra-umain/stockholm-transport to GitHub Packages.
#
# Trigger: pushing a tag matching `v*` (e.g. `v1.0.1`).
# Permissions: needs `packages: write` to upload, `contents: read` to fetch.
# Auth: uses the per-job ${{ secrets.GITHUB_TOKEN }} — no PAT required.
#
# The tag's stripped version (1.0.1) must match `libBaseVersion` in
# `gradle.properties`; the polished package.json reads from that. To bump:
#   1. Edit gradle.properties → libBaseVersion=1.0.1
#   2. Commit: chore(release): bump to 1.0.1
#   3. Tag:    git tag v1.0.1 && git push origin v1.0.1
# This workflow then fires and publishes the tarball.
name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # also runnable manually for one-off republishes

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # `registry-url` writes an ~/.npmrc that points the scope at
          # GitHub Packages and routes `_authToken` to NODE_AUTH_TOKEN.
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jacksonmafra-umain'

      - name: Validate tag matches libBaseVersion
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(grep '^libBaseVersion=' gradle.properties | cut -d= -f2)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME ($TAG) does not match libBaseVersion=$VERSION."
            echo "Bump gradle.properties first, then re-tag."
            exit 1
          fi

      - name: Build npm tarball
        run: ./gradlew :stockholm-transport:packTalkTgz --no-daemon
        env:
          # Allow the JS toolchain to install Node/Yarn itself; cuts a flaky
          # apt step that some Kotlin/JS pipelines need on bare runners.
          KOTLIN_NPM_DOWNLOAD_NODE: 'true'

      - name: Publish to GitHub Packages
        working-directory: build/distributions/npm
        run: npm publish *.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach tarball to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/npm/*.tgz
          fail_on_unmatched_files: true
