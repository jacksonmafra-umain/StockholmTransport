# Compose file for the realtime simulation backend in isolation.
# For the unified stack (this + demo/node-api + Mongo together), see the
# repo-root docker-compose.yml.

services:
  mongo:
    image: mongo:8.0
    container_name: realtime-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: stockholm_transport
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtime-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/stockholm_transport
      - NODE_ENV=development
    ports:
      - "3001:3000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    # docker:start = scripts/bootstrap.js (idempotent first-boot seeder
    # that populates Mongo from data/*.json + openapi.json) then npm run dev.
    command: npm run docker:start

volumes:
  mongo_data:
